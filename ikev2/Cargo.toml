[package]
name = "swanny-ikev2"
description = "IKEv2 message handling"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
async-trait = "0.1"
bitflags = "2"
bytes = "1"
futures = "0.3"
num-traits = "0.2"
num-derive = "0.4"
openssl = "0.10"
tokio = { version = "1.23", features = ["macros", "rt-multi-thread", "sync"] }
