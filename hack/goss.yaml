---
command:
  ssh-accessible:
    exec: "whoami"
    exit-status: 0
    stdout:
      - "core"
  sudo-works:
    exec: "sudo whoami"
    exit-status: 0
    stdout:
      - "root"
  strongswan-installed:
    exec: "rpm -q strongswan"
    exit-status: 0
    stdout:
      - "/^strongswan-/"
  swanctl-available:
    exec: "which swanctl"
    exit-status: 0
